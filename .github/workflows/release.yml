name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --package embd-app --target ${{ matrix.target }}

      - name: Bundle .app
        run: |
          APP_DIR="target/embd-${{ matrix.target }}.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          cp "target/${{ matrix.target }}/release/embd" "$APP_DIR/Contents/MacOS/embd"

          if [[ -f assets/embd.icns ]]; then
            cp assets/embd.icns "$APP_DIR/Contents/Resources/AppIcon.icns"
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$APP_DIR/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>embd</string>
              <key>CFBundleDisplayName</key>
              <string>embd</string>
              <key>CFBundleIdentifier</key>
              <string>com.embd.ide</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>embd</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Zip .app
        run: |
          cd target
          zip -r "embd-${{ matrix.target }}.zip" "embd-${{ matrix.target }}.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: embd-${{ matrix.target }}
          path: target/embd-${{ matrix.target }}.zip

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libxcb1-dev \
            libfontconfig-dev \
            libfreetype-dev \
            libssl-dev \
            pkg-config

      - name: Build
        run: cargo build --release --package embd-app --target ${{ matrix.target }}

      - name: Bundle
        run: |
          BUNDLE="target/embd-${{ matrix.target }}"
          mkdir -p "$BUNDLE"
          cp "target/${{ matrix.target }}/release/embd" "$BUNDLE/embd"
          if [[ -f public/embd_logo.png ]]; then
            cp public/embd_logo.png "$BUNDLE/embd.png"
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$BUNDLE/embd.desktop" <<DESKTOP
          [Desktop Entry]
          Name=embd
          Comment=Lightweight GPU-accelerated code editor
          Exec=embd
          Icon=embd
          Type=Application
          Categories=Development;TextEditor;IDE;
          Keywords=editor;code;ide;rust;
          StartupWMClass=embd
          Version=${VERSION}
          DESKTOP

          cd target
          tar czf "embd-${{ matrix.target }}.tar.gz" "embd-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: embd-${{ matrix.target }}
          path: target/embd-${{ matrix.target }}.tar.gz

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --package embd-app --target ${{ matrix.target }}

      - name: Bundle
        shell: bash
        run: |
          BUNDLE="target/embd-${{ matrix.target }}"
          mkdir -p "$BUNDLE"
          cp "target/${{ matrix.target }}/release/embd.exe" "$BUNDLE/embd.exe"
          if [[ -f public/embd_logo.png ]]; then
            cp public/embd_logo.png "$BUNDLE/embd.png"
          fi
          cd target
          7z a "embd-${{ matrix.target }}.zip" "embd-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: embd-${{ matrix.target }}
          path: target/embd-${{ matrix.target }}.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            embd-aarch64-apple-darwin/embd-aarch64-apple-darwin.zip
            embd-x86_64-apple-darwin/embd-x86_64-apple-darwin.zip
            embd-x86_64-unknown-linux-gnu/embd-x86_64-unknown-linux-gnu.tar.gz
            embd-x86_64-pc-windows-msvc/embd-x86_64-pc-windows-msvc.zip
